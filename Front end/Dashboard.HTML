<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andorra V1.0</title>
    <meta name="description" content="Advanced Scenario Modeling & Impact Assessment">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --background: hsl(0, 0%, 7%);
            --foreground: hsl(0, 0%, 90%);
            --card: hsl(0, 0%, 10%);
            --card-foreground: hsl(0, 0%, 90%);
            --primary: hsl(0, 0%, 70%);
            --primary-foreground: hsl(0, 0%, 10%);
            --secondary: hsl(0, 0%, 15%);
            --secondary-foreground: hsl(0, 0%, 90%);
            --muted: hsl(0, 0%, 12%);
            --muted-foreground: hsl(0, 0%, 55%);
            --accent: hsl(0, 0%, 20%);
            --destructive: hsl(0, 84.2%, 60.2%);
            --border: hsl(0, 0%, 20%);
            --panel-border: hsl(0, 0%, 20%);
            --gradient-panel: linear-gradient(145deg, hsl(0, 0%, 10%), hsl(0, 0%, 8%));
            --shadow-panel: 0 4px 20px hsl(0, 0%, 0%, 0.5);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--background);
            color: var(--foreground);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
        }

        .container {
            max-width: 100vw;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Header */
        .header {
            border-bottom: 1px solid var(--panel-border);
            background: var(--gradient-panel);
            padding: 1rem 0;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }

        .header p {
            font-size: 0.875rem;
            color: var(--muted-foreground);
        }

        /* Scenario Slider */
        .scenario-slider {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .scenario-info {
            text-align: right;
        }

        .scenario-info .label {
            font-size: 0.75rem;
            color: var(--muted-foreground);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .scenario-info .name {
            font-size: 0.875rem;
            color: var(--primary);
            font-weight: 500;
        }

        .scenario-info .description {
            font-size: 0.75rem;
            color: var(--muted-foreground);
        }

        .slider-container {
            width: 16rem;
        }

        .slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--secondary);
            outline: none;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .slider:hover {
            opacity: 1;
        }

        .slider::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }

        .slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: none;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: var(--muted-foreground);
        }

        .slider-labels span {
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .slider-labels span:hover {
            color: var(--foreground);
        }

        .slider-labels span.active {
            color: var(--primary);
            font-weight: 500;
        }

        /* Main Dashboard */
        .dashboard {
            padding: 1rem 0;
            min-height: calc(100vh - 200px);
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .tab-button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: var(--transition-smooth);
            border: none;
            cursor: pointer;
            background: transparent;
            color: var(--muted-foreground);
        }

        .tab-button:hover {
            color: var(--foreground);
            background: hsl(0, 0%, 15%, 0.5);
        }

        .tab-button.active {
            background: var(--secondary);
            color: var(--foreground);
            box-shadow: var(--shadow-panel);
        }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
            align-items: stretch;
            height: auto;
        }

        .scenario-image {
            grid-column: 1;
            grid-row: 1 / 3;
            background: var(--gradient-panel);
            border: 1px solid var(--panel-border);
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: var(--shadow-panel);
            min-height: 600px;
        }

        .scenario-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* KPI Cards */
        .kpi-card {
            background: var(--gradient-panel);
            border: 1px solid var(--panel-border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: var(--shadow-panel);
            transition: var(--transition-smooth);
        }

        .kpi-card:hover {
            transform: scale(1.02);
            border-color: hsl(0, 0%, 70%, 0.5);
        }

        .kpi-card .title {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--muted-foreground);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .kpi-card .value-container {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .kpi-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .kpi-card .unit {
            font-size: 0.875rem;
            color: var(--muted-foreground);
        }

        .kpi-card .chart {
            height: 200px;
            margin-bottom: 1rem;
        }
        
        .kpi-card .chart.radar {
            height: 300px;
        }

        .kpi-card .trend {
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            gap: 0.25rem;
        }

        .trend.up {
            color: var(--primary);
        }

        .trend.down {
            color: var(--destructive);
        }

        .trend.stable {
            color: var(--muted-foreground);
        }

        /* Footer */
        .footer {
            border-top: 1px solid var(--panel-border);
            background: var(--gradient-panel);
            margin-top: 3rem;
            padding: 1rem 0;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--muted-foreground);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .scenario-slider {
                flex-direction: column;
                gap: 1rem;
            }

            .slider-container {
                width: 100%;
            }

            .kpi-grid {
                grid-template-columns: 1fr;
            }

            .scenario-image {
                grid-row: span 1;
            }
        }
    </style>
</head>

        // State
        let activeScenario = 0;
        let activeTab = 'economic';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateTime();
            setInterval(updateTime, 1000);
            renderKPIs();
            setupEventListeners();
        });

        function updateTime() {
            document.getElementById('current-time').textContent = new Date().toLocaleTimeString();
        }

        function setupEventListeners() {
            // Scenario slider
            const slider = document.getElementById('scenario-slider');
            slider.addEventListener('input', function() {
                updateScenario(parseInt(this.value));
            });

            // Scenario labels
            document.querySelectorAll('[data-scenario]').forEach(label => {
                label.addEventListener('click', function() {
                    const scenarioIndex = parseInt(this.dataset.scenario);
                    updateScenario(scenarioIndex);
                    slider.value = scenarioIndex;
                });
            });

            // Tab buttons
            document.querySelectorAll('[data-tab]').forEach(button => {
                button.addEventListener('click', function() {
                    updateTab(this.dataset.tab);
                });
            });
        }

        function updateScenario(index) {
            activeScenario = index;
            const scenario = scenarios[index];
            
            // Update scenario info
            document.getElementById('scenario-name').textContent = scenario.name;
            document.getElementById('scenario-description').textContent = scenario.description;
            
            // Update slider labels
            document.querySelectorAll('[data-scenario]').forEach((label, i) => {
                label.classList.toggle('active', i === index);
            });
            
            renderKPIs();
        }

        function updateTab(tab) {
            activeTab = tab;

            document.querySelectorAll('[data-tab]').forEach(button => {
                button.classList.toggle('active', button.dataset.tab === tab);
            });
            
            renderKPIs();

        function renderKPIs() {
            const grid = document.getElementById('kpi-grid');
            const currentScenario = scenarios[activeScenario];
            const kpis = kpiData[activeTab];

       function generateTrendData(baseValue, trend, points = 10, kpi = {}) {
    // Use provided series if available
    if (kpi.series && Array.isArray(kpi.series)) {
        return kpi.series.map((value, i) => ({
            year: (2015 + i).toString(),
            value: value,
            target: value * 1.05,
            secondary: value * 0.95
        }));
    }
    const data = [];
    const numericValue = parseFloat(baseValue.toString().replace(/[^\d.-]/g, ''));
    for (let i = 0; i < points; i++) {
        let value = numericValue;
        let target = numericValue * 1.1;
        let secondary = numericValue * 0.8;
        if (trend === 'up') {
            value = numericValue * (0.6 + (i * 0.04)) + (Math.random() - 0.5) * (numericValue * 0.08);
            target = value * 1.15;
            secondary = value * 0.9;
        } else if (trend === 'down') {
            value = numericValue * (1.4 - (i * 0.04)) + (Math.random() - 0.5) * (numericValue * 0.08);
            target = value * 0.85;
            secondary = value * 1.1;
        } else {
            value = numericValue + (Math.random() - 0.5) * (numericValue * 0.05);
            target = value * 1.05;
            secondary = value * 0.95;
        }
        data.push({
            year: (2015 + i).toString(),
            value: Math.max(0, value),
            target: Math.max(0, target),
            secondary: Math.max(0, secondary)
        });
    }
    return data;
}

// Update renderChart to pass kpi as argument to generateTrendData
function renderChart(canvasId, kpi) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    const data = generateTrendData(kpi.value, kpi.trend, 10, kpi); // Pass kpi as 4th argument
    
    // Apply dark theme defaults
    Chart.defaults.color = '#888';
    Chart.defaults.borderColor = '#333';
    Chart.defaults.backgroundColor = '#1a1a1a';
    
    let chartConfig = {
        type: getChartType(kpi.chartType),
        data: getChartData(data, kpi),
        options: getChartOptions(kpi.chartType, kpi)
    };
    
    new Chart(ctx, chartConfig);
}
        
        function getChartType(chartType) {
            const typeMapping = {
                'area': 'line',
                'bar': 'bar',
                'pie': 'pie',
                'radial': 'doughnut',
                'line': 'line',
                'pentagon': 'radar'
            };
            return typeMapping[chartType] || 'line';
        }
        
        function getChartData(data, kpi) {
            const years = data.map(d => d.year);
            const values = data.map(d => d.value);
            const targets = data.map(d => d.target);
            const secondaries = data.map(d => d.secondary);
            
            switch(kpi.chartType) {
                case 'pie':
                    return {
                        labels: years,
                        datasets: [{
                            data: values,
                            backgroundColor: [
                                kpi.color,
                                kpi.secondaryColor,
                                kpi.color + '80',
                                kpi.secondaryColor + '80',
                                kpi.color + '40'
                            ],
                            borderWidth: 2,
                            borderColor: '#1a1a1a'
                        }]
                    };
                    
                case 'radial':
                    // Show current value as percentage of max
                    const currentValue = values[values.length - 1];
                    const percentage = Math.min(100, (currentValue / kpi.maxValue) * 100);
                    return {
                        labels: [kpi.title],
                        datasets: [{
                            data: [percentage, 100 - percentage],
                            backgroundColor: [kpi.color, '#333'],
                            borderWidth: 0,
                            cutout: '60%'
                        }]
                    };
                    
                case 'pentagon':
                    // Pentagon/radar chart with 5 data points (last 5 years)
                    const last5Years = years.slice(-5);
                    const last5Values = values.slice(-5);
                    const last5Targets = targets.slice(-5);
                    return {
                        labels: last5Years,
                        datasets: [{
                            label: 'Actual',
                            data: last5Values,
                            borderColor: kpi.color,
                            backgroundColor: kpi.color + '20',
                            borderWidth: 2,
                            pointRadius: 4,
                            pointBackgroundColor: kpi.color,
                            pointBorderColor: '#1a1a1a',
                            pointBorderWidth: 2
                        }, {
                            label: 'Target',
                            data: last5Targets,
                            borderColor: kpi.secondaryColor,
                            backgroundColor: kpi.secondaryColor + '10',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            pointRadius: 4,
                            pointBackgroundColor: kpi.secondaryColor,
                            pointBorderColor: '#1a1a1a',
                            pointBorderWidth: 2
                        }]
                    };
                    
                case 'bar':
                    return {
                        labels: years,
                        datasets: [{
                            label: 'Value',
                            data: values,
                            backgroundColor: kpi.color + '80',
                            borderColor: kpi.color,
                            borderWidth: 2,
                            borderRadius: 4,
                            borderSkipped: false
                        }]
                    };
                    
                case 'area':
                    return {
                        labels: years,
                        datasets: [{
                            label: 'Value',
                            data: values,
                            borderColor: kpi.color,
                            backgroundColor: kpi.color + '20',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            pointBackgroundColor: kpi.color,
                            pointBorderColor: '#1a1a1a',
                            pointBorderWidth: 2
                        }]
                    };
                    
                default: // line
                    return {
                        labels: years,
                        datasets: [{
                            label: 'Actual',
                            data: values,
                            borderColor: kpi.color,
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            tension: 0.4,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            pointBackgroundColor: kpi.color,
                            pointBorderColor: '#1a1a1a',
                            pointBorderWidth: 2
                        }, {
                            label: 'Target',
                            data: targets,
                            borderColor: kpi.secondaryColor,
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            tension: 0.4,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            pointBackgroundColor: kpi.secondaryColor,
                            pointBorderColor: '#1a1a1a',
                            pointBorderWidth: 2
                        }]
                    };
            }
        }
        
        function getChartOptions(chartType, kpi) {
            const baseOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: chartType === 'pie' || chartType === 'line',
                        position: 'bottom',
                        labels: {
                            color: '#888',
                            font: { size: 10 },
                            usePointStyle: true,
                            padding: 15
                        }
                    },
                    tooltip: {
                        backgroundColor: '#1a1a1a',
                        titleColor: '#fff',
                        bodyColor: '#fff',
                        borderColor: '#333',
                        borderWidth: 1,
                        cornerRadius: 8,
                        displayColors: true
                    }
                },
                interaction: {
                    intersect: false,
                    mode: 'index'
                }
            };
            
            if (chartType === 'pie') {
                return {
                    ...baseOptions,
                    plugins: {
                        ...baseOptions.plugins,
                        legend: {
                            ...baseOptions.plugins.legend,
                            display: true,
                            position: 'right'
                        }
                    }
                };
            }
            
            if (chartType === 'radial') {
                return {
                    ...baseOptions,
                    plugins: {
                        ...baseOptions.plugins,
                        legend: {
                            display: false
                        }
                    },
                    cutout: '60%'
                };
            }
            
            if (chartType === 'pentagon') {
                return {
                    ...baseOptions,
                    plugins: {
                        ...baseOptions.plugins,
                        legend: {
                            display: true,
                            position: 'bottom',
                            labels: {
                                color: '#888',
                                font: { 
                                    size: 12,
                                    weight: '500'
                                },
                                padding: 15,
                                usePointStyle: true
                            }
                        }
                    },
                    scales: {
                        r: {
                            angleLines: {
                                color: '#444',
                                lineWidth: 1
                            },
                            grid: {
                                color: '#444',
                                lineWidth: 1
                            },
                            pointLabels: {
                                color: '#ccc',
                                font: { 
                                    size: 16,
                                    weight: '600'
                                },
                                padding: 25
                            },
                            ticks: {
                                color: '#888',
                                font: { size: 11 },
                                display: true,
                                stepSize: kpi.maxValue / 5,
                                backdropColor: 'transparent'
                            },
                            suggestedMin: 0,
                            suggestedMax: kpi.maxValue,
                            beginAtZero: true
                        }
                    },
                    layout: {
                        padding: {
                            top: 30,
                            bottom: 20,
                            left: 30,
                            right: 30
                        }
                    }
                };
            }
            
            return {
                ...baseOptions,
                scales: {
                    x: {
                        display: true,
                        grid: {
                            display: true,
                            color: '#333',
                            drawBorder: false
                        },
                        ticks: {
                            color: '#888',
                            font: { size: 10 }
                        }
                    },
                    y: {
                        display: true,
                        grid: {
                            display: true,
                            color: '#333',
                            drawBorder: false
                        },
                        ticks: {
                            color: '#888',
                            font: { size: 10 }
                        }
                    }
                }
            };
        }
    </script>
</body>
</html>
